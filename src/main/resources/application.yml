server:
  port: 8080

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

spring:
  application:
    name: pain001-generator
  datasource:
    url: jdbc:h2:file:./build/h2/iso20022;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId:-na}] [%X{httpMethod:-na} %X{requestPath:-na}] [msgId=%X{msgId:-na}] [endToEndId=%X{endToEndId:-na}] %logger{36} : %msg%n"
  level:
    com.lanre.personl.iso20022: INFO

iso20022:
  security:
    audit-payload-mode: REDACT
    audit-payload-storage-mode: DATABASE
    audit-payload-hash-enabled: true
    encryption-key: ""
    redaction-placeholder: "[REDACTED]"
    blob-storage:
      enabled: false
      base-path: build/audit-payloads
    sensitive-xml-tags:
      - Nm
      - IBAN
      - BICFI
      - Ustrd
      - AdrLine
      - EndToEndId
      - InstrId
      - TxId
  api:
    enabled: true
    request-limits:
      xml-bytes: 262144
      json-bytes: 65536
      text-bytes: 131072
    rate-limit:
      enabled: true
      requests-per-window: 60
      window-seconds: 60
      trust-forwarded-for: false
    auth:
      realm: iso20022-api
      writer:
        username: api-writer
        password: changeit-writer-password
        role: WRITER
      auditor:
        username: api-auditor
        password: changeit-auditor-password
        role: AUDITOR
      admin:
        username: api-admin
        password: changeit-admin-password
        role: ADMIN
  routing:
    rules:
      - id: high-value-priority
        order: 1
        adapter: HIGH-VALUE-PRIORITY-QUEUE
        receiver-bics:
          - CHASUS33XXX
          - CITIUS33XXX
      - id: sepa-eur
        order: 2
        adapter: SEPA-MOCK-SERVICE
        currencies:
          - EUR
      - id: fedwire-usd
        order: 3
        adapter: FEDWIRE-MOCK-SERVICE
        currencies:
          - USD
  logging:
    include-full-xml: false
